<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momente Archiv ✨ – Nele & Andreas</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #e8738a;
    --gold: #d4a061;
    --accent: #ff6b9d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }
  body {
    min-height: 100%;
    background: radial-gradient(ellipse at 10% 10%, rgba(255,107,157,0.18) 0%, transparent 45%),
                radial-gradient(ellipse at 90% 5%, rgba(212,160,97,0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 90%, rgba(232,115,138,0.12) 0%, transparent 50%),
                linear-gradient(160deg, #1a0520 0%, #2d0a3a 30%, #1e0530 60%, #110320 100%);
    background-attachment: fixed;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Stars */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; border-radius: 50%;
    animation: starTwinkle ease-in-out infinite;
  }
  /* tiny */
  .star.s { width: 1px; height: 1px; background: rgba(255,255,255,0.9); }
  /* small */
  .star.m { width: 2px; height: 2px; background: white; }
  /* medium – tinted */
  .star.l {
    width: 3px; height: 3px;
    box-shadow: 0 0 4px 1px currentColor;
  }
  .star.l.rose   { color: rgba(255,160,190,0.9); background: rgba(255,160,190,0.9); }
  .star.l.gold   { color: rgba(255,210,130,0.9); background: rgba(255,210,130,0.9); }
  .star.l.violet { color: rgba(196,181,253,0.9); background: rgba(196,181,253,0.9); }
  .star.l.white  { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.9); }
  /* large – cross sparkle */
  .star.xl {
    width: 4px; height: 4px; background: white;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.6),
                0 -5px 0 0 rgba(255,255,255,0.35),
                0  5px 0 0 rgba(255,255,255,0.35),
                -5px 0 0 0 rgba(255,255,255,0.35),
                 5px 0 0 0 rgba(255,255,255,0.35);
  }
  .star.xl.rose {
    background: rgba(255,160,190,1);
    box-shadow: 0 0 8px 3px rgba(255,107,157,0.55),
                0 -6px 0 0 rgba(255,160,190,0.3),
                0  6px 0 0 rgba(255,160,190,0.3),
                -6px 0 0 0 rgba(255,160,190,0.3),
                 6px 0 0 0 rgba(255,160,190,0.3);
  }
  .star.xl.gold {
    background: rgba(255,215,120,1);
    box-shadow: 0 0 8px 3px rgba(212,160,97,0.55),
                0 -6px 0 0 rgba(255,215,120,0.3),
                0  6px 0 0 rgba(255,215,120,0.3),
                -6px 0 0 0 rgba(255,215,120,0.3),
                 6px 0 0 0 rgba(255,215,120,0.3);
  }

  @keyframes starTwinkle {
    0%   { opacity: 0.05; transform: scale(0.8); }
    50%  { opacity: 1;    transform: scale(1.25); }
    100% { opacity: 0.05; transform: scale(0.8); }
  }
  @keyframes starFade {
    0%   { opacity: 0; }
    20%  { opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { opacity: 0; }
  }

  /* Shooting stars */
  .shooting-star {
    position: absolute; pointer-events: none;
    width: 2px; height: 2px; border-radius: 50%;
    background: white;
    box-shadow: 0 0 4px 1px rgba(255,255,255,0.6);
    animation: shootingStar linear infinite;
    opacity: 0;
  }
  @keyframes shootingStar {
    0%   { transform: translate(0, 0) rotate(var(--angle, -35deg)) scaleX(1); opacity: 0; }
    2%   { opacity: 1; }
    5%   { transform: translate(var(--tx, 180px), var(--ty, 100px)) rotate(var(--angle, -35deg)) scaleX(60); opacity: 0.8; }
    8%   { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Top bar */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    display: none; align-items: center; gap: 8px;
    padding: 10px 16px; flex-wrap: nowrap;
    background: rgba(26,5,32,0.92); border-bottom: 1px solid rgba(255,107,157,0.2);
    backdrop-filter: blur(12px);
  }
  .top-bar.visible { display: flex; }
  .top-bar-btn {
    background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,107,157,0.3);
    border-radius: 50px; padding: 7px 14px;
    font-family: 'Quicksand', sans-serif; font-size: 12px; font-weight: 600;
    color: rgba(255,107,157,0.9); cursor: pointer; transition: all 0.2s ease;
    text-decoration: none; display: inline-block; white-space: nowrap;
  }
  .top-bar-btn:hover { background: rgba(255,107,157,0.15); border-color: #ff6b9d; color: #ff6b9d; }
  .coin-display {
    display: flex; align-items: center; gap: 5px;
    background: rgba(212,160,97,0.12); border: 1.5px solid rgba(212,160,97,0.35);
    border-radius: 50px; padding: 5px 12px;
    font-size: 12px; font-weight: 700; color: var(--gold); white-space: nowrap;
  }
  .coin-display .coin-count { font-family: 'Dancing Script', cursive; font-size: 17px; }
  .top-bar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #logoutBtn { max-width: 130px; overflow: hidden; text-overflow: ellipsis; }

  /* Auth loading */
  .auth-loading {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    background: #1a0520;
  }
  .auth-spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,107,157,0.2);
    border-top-color: #ff6b9d; border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Login modal */
  .login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: none; align-items: center; justify-content: center;
    background: rgba(26,5,32,0.95); backdrop-filter: blur(10px);
  }
  .login-overlay.open { display: flex; }
  .login-card {
    background: rgba(40,10,50,0.95); border: 1.5px solid rgba(255,107,157,0.3);
    border-radius: 28px; padding: 40px 32px 36px; max-width: 340px; width: 90%;
    text-align: center; box-shadow: 0 20px 70px rgba(255,107,157,0.2);
  }
  .login-emoji { font-size: 40px; margin-bottom: 12px; display: block; }
  .login-title {
    font-family: 'Dancing Script', cursive; font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, #ff6b9d, #c2185b 60%, #f5a3b5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .login-sub { font-size: 13px; color: rgba(255,107,157,0.7); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 24px; font-weight: 500; }
  .login-field {
    width: 100%; border: 1.5px solid rgba(255,107,157,0.3); border-radius: 14px;
    padding: 13px 16px; font-family: 'Quicksand', sans-serif; font-size: 16px; font-weight: 500;
    color: #fde8ed; background: rgba(255,107,157,0.06); outline: none; margin-bottom: 12px;
    transition: border-color 0.2s ease; box-sizing: border-box;
    -webkit-appearance: none; appearance: none;
  }
  .login-field:focus { border-color: #ff6b9d; }
  .login-btn {
    width: 100%; border: none; border-radius: 50px; padding: 16px;
    font-family: 'Quicksand', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, #ff6b9d 0%, #c2185b 100%); color: white;
    box-shadow: 0 4px 20px rgba(255,107,157,0.4); transition: transform 0.2s ease; margin-top: 4px;
    -webkit-appearance: none; appearance: none;
  }
  .login-btn:active { transform: scale(0.97); }
  .login-error { font-size: 12px; color: #ff6b9d; margin-top: 10px; min-height: 18px; font-weight: 600; }

  /* Page header – fixed overlay */
  .page-header {
    position: fixed; top: 45px; left: 0; right: 0; z-index: 100;
    text-align: center; padding: 18px 16px 16px; pointer-events: none;
  }
  .page-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(32px, 8vw, 72px); font-weight: 700;
    background: linear-gradient(135deg, #ff6b9d 0%, #c2185b 40%, #f5a3b5 80%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 18px rgba(255,107,157,0.4));
    line-height: 1.1;
  }
  .page-subtitle {
    font-size: 11px; color: rgba(255,107,157,0.6); letter-spacing: 2px;
    text-transform: uppercase; margin-top: 4px; font-weight: 500;
  }

  /* Filter bar – inside page-header, needs pointer events */
  .filter-bar {
    display: none; gap: 7px; align-items: center;
    justify-content: center; flex-wrap: wrap;
    margin-top: 14px; pointer-events: auto;
    padding: 0 4px;
  }
  .filter-bar.visible { display: flex; }

  .filter-btn {
    border-radius: 50px; padding: 8px 18px;
    font-family: 'Quicksand', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.4px; white-space: nowrap;
    transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    backdrop-filter: blur(10px); border: 1.5px solid transparent;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .filter-btn.btn-all {
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
    border-color: rgba(255,255,255,0.14);
  }
  .filter-btn.btn-all:hover, .filter-btn.btn-all.active {
    background: rgba(255,255,255,0.16); color: white;
    border-color: rgba(255,255,255,0.45);
    box-shadow: 0 4px 16px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .filter-btn.btn-andreas {
    background: rgba(232,115,138,0.08); color: rgba(232,115,138,0.65);
    border-color: rgba(232,115,138,0.22);
  }
  .filter-btn.btn-andreas:hover { background: rgba(232,115,138,0.18); color: #f5a3b5; border-color: rgba(232,115,138,0.55); }
  .filter-btn.btn-andreas.active {
    background: linear-gradient(135deg, rgba(232,115,138,0.38), rgba(200,80,112,0.32));
    color: #fce4ec; border-color: rgba(232,115,138,0.72);
    box-shadow: 0 4px 20px rgba(232,115,138,0.28), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .filter-btn.btn-nele {
    background: rgba(167,139,250,0.08); color: rgba(167,139,250,0.65);
    border-color: rgba(167,139,250,0.22);
  }
  .filter-btn.btn-nele:hover { background: rgba(167,139,250,0.18); color: #c4b5fd; border-color: rgba(167,139,250,0.55); }
  .filter-btn.btn-nele.active {
    background: linear-gradient(135deg, rgba(167,139,250,0.38), rgba(124,58,237,0.32));
    color: #ede9fe; border-color: rgba(167,139,250,0.72);
    box-shadow: 0 4px 20px rgba(167,139,250,0.28), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  /* Empty state */
  .empty-state {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; z-index: 50;
    flex-direction: column; gap: 16px; padding: 20px;
  }
  .empty-state.visible { display: flex; }
  .empty-emoji { font-size: 60px; animation: emptyFloat 3s ease-in-out infinite; }
  @keyframes emptyFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .empty-text { font-family: 'Dancing Script', cursive; font-size: 26px; color: rgba(255,107,157,0.7); text-align: center; }
  .empty-sub { font-size: 13px; color: rgba(255,107,157,0.4); text-align: center; font-weight: 500; }

  /* Count badge */
  .count-badge {
    position: fixed; bottom: 20px; right: 16px; z-index: 200;
    background: rgba(255,107,157,0.15); border: 1.5px solid rgba(255,107,157,0.3);
    border-radius: 50px; padding: 7px 16px;
    font-size: 12px; font-weight: 700; color: rgba(255,107,157,0.8);
    backdrop-filter: blur(10px); display: none;
  }
  .count-badge.visible { display: block; }

  /* FLOATING MOMENT CARDS */
  .moments-canvas {
    position: fixed; inset: 0; overflow: hidden;
    z-index: 10; pointer-events: none;
  }
  .moment-bubble {
    position: absolute; pointer-events: auto;
    background: rgba(18, 4, 24, 0.72);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-radius: 22px; padding: 18px 20px 16px;
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.1);
    transition: opacity 0.45s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    border: 1.5px solid rgba(232,115,138,0.35);
  }
  .moment-bubble:active { transform: scale(0.97); }
  .moment-bubble.andreas {
    border-color: rgba(232,115,138,0.4);
    background: rgba(40, 6, 20, 0.78);
  }
  .moment-bubble.nele {
    border-color: rgba(167,139,250,0.4);
    background: rgba(18, 6, 40, 0.78);
  }

  /* Hover only on non-touch devices */
  @media (hover: hover) {
    .moment-bubble.andreas:hover {
      border-color: rgba(232,115,138,0.75);
      box-shadow: 0 20px 60px rgba(232,115,138,0.35), 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.14);
    }
    .moment-bubble.nele:hover {
      border-color: rgba(167,139,250,0.75);
      box-shadow: 0 20px 60px rgba(167,139,250,0.35), 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.14);
    }
  }

  .moment-glow {
    position: absolute; inset: 0; border-radius: 22px; pointer-events: none;
    background: linear-gradient(150deg, rgba(255,107,157,0.12) 0%, transparent 55%, rgba(212,160,97,0.06) 100%);
  }
  .moment-bubble.nele .moment-glow {
    background: linear-gradient(150deg, rgba(167,139,250,0.14) 0%, transparent 55%, rgba(196,181,253,0.06) 100%);
  }

  .moment-author-row { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .moment-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Dancing Script', cursive; font-size: 13px; font-weight: 700; color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .moment-bubble.andreas .moment-avatar {
    background: linear-gradient(135deg, #e8738a, #c85070);
    box-shadow: 0 2px 10px rgba(232,115,138,0.5);
  }
  .moment-bubble.nele .moment-avatar {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    box-shadow: 0 2px 10px rgba(167,139,250,0.5);
  }
  .moment-author-name { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
  .moment-bubble.andreas .moment-author-name { color: #f5a3b5; }
  .moment-bubble.nele    .moment-author-name { color: #c4b5fd; }

  .moment-text {
    font-family: 'Dancing Script', cursive; font-size: 17px; font-weight: 600;
    color: #fff0f6; line-height: 1.55;
    word-break: break-word; margin-bottom: 12px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
  .moment-meta {
    font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
  }
  .moment-bubble.andreas .moment-meta { color: rgba(245,163,181,0.65); }
  .moment-bubble.nele    .moment-meta { color: rgba(196,181,253,0.65); }

  /* Dimmed state */
  .moment-bubble.dimmed { opacity: 0.06 !important; pointer-events: none; }

  /* Pop on tap */
  @keyframes bubblePop {
    0%  { transform: scale(1); }
    30% { transform: scale(1.14); }
    60% { transform: scale(0.95); }
    100%{ transform: scale(1); }
  }
  .moment-bubble.popping { animation: bubblePop 0.38s cubic-bezier(0.22,1,0.36,1) !important; }

  /* Scroll hint arrow (shown when content extends below viewport) */
  .scroll-hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 201; display: none; flex-direction: column; align-items: center; gap: 4px;
    animation: hintBob 1.6s ease-in-out infinite; pointer-events: none;
  }
  .scroll-hint.visible { display: flex; }
  .scroll-hint-arrow { font-size: 18px; opacity: 0.5; }
  .scroll-hint-text { font-size: 10px; color: rgba(255,107,157,0.5); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  @keyframes hintBob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(6px)} }

  /* Detail modal */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 9000;
    display: none; align-items: center; justify-content: center;
    background: rgba(26,5,32,0.9); backdrop-filter: blur(12px);
    padding: 16px;
  }
  .detail-overlay.open { display: flex; }
  .detail-card {
    background: rgba(40,10,52,0.97); border: 1.5px solid rgba(255,107,157,0.3);
    border-radius: 24px; padding: 28px 24px 24px; max-width: 420px; width: 100%;
    text-align: center; box-shadow: 0 24px 80px rgba(255,107,157,0.2);
    animation: detailIn 0.32s cubic-bezier(0.22,1,0.36,1);
    max-height: 88vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  @keyframes detailIn {
    0%  { transform: scale(0.88) translateY(20px); opacity: 0; }
    100%{ transform: scale(1) translateY(0); opacity: 1; }
  }
  .detail-author-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
  .detail-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Dancing Script', cursive; font-size: 20px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .detail-author-name { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .detail-text {
    font-family: 'Dancing Script', cursive; font-size: clamp(18px, 5vw, 24px); font-weight: 600;
    color: rgba(255,240,248,0.95); line-height: 1.6; margin-bottom: 18px;
    word-break: break-word;
  }
  .detail-meta { font-size: 12px; color: rgba(255,107,157,0.5); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 22px; }
  .detail-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .detail-close {
    flex: 1; border: 1.5px solid rgba(255,107,157,0.3); border-radius: 50px; padding: 12px 20px;
    font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; background: transparent; color: rgba(255,107,157,0.8);
    transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; white-space: nowrap;
  }
  .detail-close:hover, .detail-close:active { border-color: #ff6b9d; color: #ff6b9d; background: rgba(255,107,157,0.08); }
  .detail-delete {
    flex: 1; border: 1.5px solid rgba(255,80,80,0.25); border-radius: 50px; padding: 12px 20px;
    font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; background: transparent; color: rgba(255,110,110,0.7);
    transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; white-space: nowrap;
  }
  .detail-delete:hover, .detail-delete:active { border-color: #ff5050; color: #ff6060; background: rgba(255,80,80,0.08); }

  /* Löschen-Bestätigung */
  .delete-overlay {
    position: fixed; inset: 0; z-index: 9500;
    display: none; align-items: center; justify-content: center;
    background: rgba(20,3,28,0.93); backdrop-filter: blur(14px);
    padding: 16px;
  }
  .delete-overlay.open { display: flex; }
  .delete-card {
    background: rgba(40,8,50,0.98); border: 1.5px solid rgba(255,80,80,0.3);
    border-radius: 24px; padding: 32px 28px 28px; max-width: 340px; width: 100%;
    text-align: center; box-shadow: 0 24px 80px rgba(255,60,60,0.18);
    animation: detailIn 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  .delete-emoji { font-size: 46px; margin-bottom: 14px; }
  .delete-title {
    font-family: 'Dancing Script', cursive; font-size: 26px; font-weight: 700;
    color: rgba(255,170,170,0.95); margin-bottom: 8px;
  }
  .delete-sub { font-size: 13px; color: rgba(255,140,140,0.5); font-weight: 500; margin-bottom: 12px; line-height: 1.5; }
  .delete-preview {
    font-family: 'Dancing Script', cursive; font-size: 16px;
    color: rgba(255,200,200,0.65); margin-bottom: 24px; line-height: 1.55;
    word-break: break-word; padding: 0 4px;
  }
  .delete-btns { display: flex; gap: 10px; }
  .delete-no {
    flex: 1; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 50px; padding: 13px;
    font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; background: transparent; color: rgba(255,255,255,0.55);
    transition: all 0.2s ease; touch-action: manipulation;
  }
  .delete-no:hover, .delete-no:active { border-color: rgba(255,255,255,0.4); color: white; }
  .delete-yes {
    flex: 1; border: none; border-radius: 50px; padding: 13px;
    font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; background: linear-gradient(135deg, #ff5050, #c0182b); color: white;
    box-shadow: 0 4px 18px rgba(255,70,70,0.35); transition: transform 0.2s ease;
    touch-action: manipulation;
  }
  .delete-yes:hover, .delete-yes:active { transform: scale(1.03); }
  .delete-yes:disabled { opacity: 0.6; cursor: default; transform: none; }
  .detail-card.andreas .detail-avatar { background: linear-gradient(135deg, #e8738a, #c85070); }
  .detail-card.andreas .detail-author-name { color: rgba(232,115,138,0.9); }
  .detail-card.nele    .detail-avatar { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
  .detail-card.nele    .detail-author-name { color: rgba(167,139,250,0.9); }
  .detail-card.nele    .detail-meta { color: rgba(167,139,250,0.5); }
  .detail-card.nele    .detail-close { border-color: rgba(167,139,250,0.3); color: rgba(167,139,250,0.8); }
  .detail-card.nele    .detail-close:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.08); }
  .detail-card.nele    .detail-delete { border-color: rgba(255,80,80,0.2); }
  .detail-card.nele    .detail-delete:hover, .detail-card.nele .detail-delete:active { border-color: #ff5050; color: #ff6060; background: rgba(255,80,80,0.08); }

  /* Mobile-specific tweaks */
  @media (max-width: 480px) {
    .filter-btn { padding: 7px 14px; font-size: 11px; }
    .top-bar { padding: 9px 12px; }
    .count-badge { display: none !important; } /* replaced by scroll hint on mobile */
  }
</style>
</head>
<body>

<div class="auth-loading" id="authLoading"><div class="auth-spinner"></div></div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Top bar -->
<div class="top-bar" id="topBar">
  <a href="index.html" class="top-bar-btn">← Zurück</a>
  <div class="top-bar-right">
    <div class="coin-display" id="coinDisplay" style="display:none;">
      <span>🪙</span><span class="coin-count" id="coinCount">0</span>
    </div>
    <button class="top-bar-btn" id="logoutBtn">Ausloggen</button>
  </div>
</div>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <span class="login-emoji">✨</span>
    <div class="login-title">Momente Archiv</div>
    <div class="login-sub">Bitte einloggen</div>
    <input class="login-field" type="email" id="loginEmail" placeholder="E-Mail" autocomplete="email" inputmode="email">
    <input class="login-field" type="password" id="loginPw" placeholder="Passwort">
    <button class="login-btn" id="loginBtn">Einloggen 🌸</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Page header -->
<div class="page-header" id="pageHeader" style="display:none;">
  <div class="page-title">Unsere Momente</div>
  <div class="page-subtitle">Für immer festgehalten ✨</div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn btn-all active" data-filter="all">✨ Alle</button>
    <button class="filter-btn btn-andreas" data-filter="andreas">🐾 Andreas</button>
    <button class="filter-btn btn-nele" data-filter="nele">🌸 Nele</button>
  </div>
</div>

<!-- Empty state -->
<div class="empty-state" id="emptyState">
  <div class="empty-emoji">🌸</div>
  <div class="empty-text">Noch keine Momente</div>
  <div class="empty-sub">Speichere euren ersten Moment auf der Startseite</div>
</div>

<!-- Canvas for floating bubbles (absolute → body scrolls) -->
<div class="moments-canvas" id="momentsCanvas"></div>

<!-- Count badge -->
<div class="count-badge" id="countBadge"></div>

<!-- Scroll hint -->
<div class="scroll-hint" id="scrollHint">
  <div class="scroll-hint-arrow">↓</div>
  <div class="scroll-hint-text">Scrollen</div>
</div>

<!-- Detail modal -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard">
    <div class="detail-author-row">
      <div class="detail-avatar" id="detailAvatar"></div>
      <div class="detail-author-name" id="detailAuthor"></div>
    </div>
    <div class="detail-text" id="detailText"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-btns">
      <button class="detail-delete" id="detailDelete">🗑️ Löschen</button>
      <button class="detail-close" id="detailClose">Schließen</button>
    </div>
  </div>
</div>

<!-- Löschen-Bestätigung -->
<div class="delete-overlay" id="deleteOverlay">
  <div class="delete-card">
    <div class="delete-emoji">🗑️</div>
    <div class="delete-title">Wirklich löschen?</div>
    <div class="delete-sub">Dieser Moment verschwindet für immer aus dem Archiv</div>
    <div class="delete-preview" id="deletePreview"></div>
    <div class="delete-btns">
      <button class="delete-no" id="deleteNo">Abbrechen</button>
      <button class="delete-yes" id="deleteYes">Ja, löschen</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyDSkijSdMeV4WcsWGGXcQjVPwEvzDCZvW8",
    authDomain: "nele-und-andreas.firebaseapp.com",
    databaseURL: "https://nele-und-andreas-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nele-und-andreas",
    storageBucket: "nele-und-andreas.firebasestorage.app",
    messagingSenderId: "694973604970",
    appId: "1:694973604970:web:331975714dca0cd32ad613"
  });
  const db   = getDatabase(app);
  const auth = getAuth(app);

  // Stars
  const starsEl = document.getElementById('stars');
  const rand = (a, b) => a + Math.random() * (b - a);

  // Tiny background stars
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star s';
    s.style.cssText = `left:${rand(0,100)}%;top:${rand(0,100)}%;animation:starFade ${rand(3,8)}s ease-in-out ${rand(0,8)}s infinite;`;
    starsEl.appendChild(s);
  }
  // Small stars
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star m';
    s.style.cssText = `left:${rand(0,100)}%;top:${rand(0,100)}%;animation:starTwinkle ${rand(2,6)}s ease-in-out ${rand(0,6)}s infinite;`;
    starsEl.appendChild(s);
  }
  // Tinted medium stars
  const tints = ['rose','gold','violet','white'];
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = `star l ${tints[i % tints.length]}`;
    s.style.cssText = `left:${rand(0,100)}%;top:${rand(0,100)}%;animation:starTwinkle ${rand(3,7)}s ease-in-out ${rand(0,7)}s infinite;`;
    starsEl.appendChild(s);
  }
  // Large sparkle stars
  const xlTints = ['white','rose','gold','white','white'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = `star xl ${xlTints[i % xlTints.length]}`;
    s.style.cssText = `left:${rand(5,95)}%;top:${rand(5,90)}%;animation:starTwinkle ${rand(4,9)}s ease-in-out ${rand(0,9)}s infinite;`;
    starsEl.appendChild(s);
  }
  // Shooting stars
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('div');
    s.className = 'shooting-star';
    const angle = rand(-50, -20);
    const dist  = rand(140, 260);
    const tx    = Math.cos(angle * Math.PI / 180) * dist;
    const ty    = Math.sin(angle * Math.PI / 180) * dist;
    s.style.cssText = `
      left:${rand(10,80)}%; top:${rand(5,50)}%;
      --angle:${angle}deg; --tx:${tx}px; --ty:${ty}px;
      animation-duration:${rand(6,14)}s;
      animation-delay:${rand(0,14)}s;
    `;
    starsEl.appendChild(s);
  }

  function displayName(email) {
    if (email.toLowerCase() === 'raederich@outlook.com') return 'Andreas';
    if (email.toLowerCase() === 'nele.busse@web.de')     return 'Nele';
    return email.split('@')[0];
  }

  // Login
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPw').value;
    document.getElementById('loginError').textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pw);
    } catch {
      document.getElementById('loginError').textContent = 'E-Mail oder Passwort falsch 🐾';
    }
  });
  document.getElementById('loginPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  // Auth state
  onAuthStateChanged(auth, user => {
    document.getElementById('authLoading').style.display = 'none';
    if (user) {
      const name = displayName(user.email);
      document.getElementById('loginOverlay').classList.remove('open');
      document.getElementById('topBar').classList.add('visible');
      document.getElementById('pageHeader').style.display = 'block';
      document.getElementById('logoutBtn').textContent = name + ' ausloggen';
      document.getElementById('coinDisplay').style.display = 'flex';
      document.getElementById('filterBar').classList.add('visible');

      onValue(ref(db, `coins/${name.toLowerCase()}`), snap => {
        document.getElementById('coinCount').textContent = (snap.val() || 0).toLocaleString('de-DE');
      });

      onValue(ref(db, 'saved_moments'), snap => {
        renderMoments(snap.val());
      });
    } else {
      document.getElementById('topBar').classList.remove('visible');
      document.getElementById('pageHeader').style.display = 'none';
      document.getElementById('loginOverlay').classList.add('open');
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      floatingCards = [];
      document.getElementById('momentsCanvas').innerHTML = '';
      document.getElementById('emptyState').classList.remove('visible');
      document.getElementById('countBadge').classList.remove('visible');
      document.getElementById('filterBar').classList.remove('visible');
    }
  });

  // Measure the actual fixed header height so we never overlap it
  function getHeaderOffset() {
    const header = document.getElementById('pageHeader');
    if (!header || header.style.display === 'none') return 200;
    const rect = header.getBoundingClientRect();
    // rect.bottom = top of topbar (45px) + header height
    return rect.bottom + 20;
  }

  // ---- RAF DRIFT ENGINE ----
  let rafId = null;
  let floatingCards = [];

  function startDrift() {
    if (rafId) cancelAnimationFrame(rafId);
    function tick() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      floatingCards.forEach(c => {
        c.x += c.vx;
        c.y += c.vy;
        c.rot += c.vrot;
        // Wrap around edges seamlessly
        if (c.vx > 0 && c.x > vw + 80)    c.x = -c.w - 80;
        if (c.vx < 0 && c.x < -c.w - 80)  c.x = vw + 80;
        if (c.vy > 0 && c.y > vh + 80)    c.y = -c.h - 80;
        if (c.vy < 0 && c.y < -c.h - 80)  c.y = vh + 80;
        c.el.style.transform = `translate(${c.x}px,${c.y}px) rotate(${c.rot}deg)`;
      });
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
    else if (floatingCards.length) startDrift();
  });

  function renderMoments(data) {
    const canvas = document.getElementById('momentsCanvas');
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    floatingCards = [];
    canvas.innerHTML = '';

    if (!data) {
      document.getElementById('emptyState').classList.add('visible');
      document.getElementById('countBadge').classList.remove('visible');
      return;
    }

    const moments = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
    if (moments.length === 0) {
      document.getElementById('emptyState').classList.add('visible');
      document.getElementById('countBadge').classList.remove('visible');
      return;
    }

    document.getElementById('emptyState').classList.remove('visible');
    document.getElementById('countBadge').textContent = moments.length + ' Momente';
    document.getElementById('countBadge').classList.add('visible');

    const isMobile = window.innerWidth <= 600;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const cardW = isMobile ? Math.min(vw * 0.78, 250) : 240;
    const cardH = isMobile ? 130 : 145;
    const headerH = getHeaderOffset();
    const safeTop = headerH + 10;
    const safeH   = Math.max(100, vh - safeTop - 20);

    moments.forEach((m) => {
      // Random start position spread across the visible area
      const x   = Math.random() * Math.max(20, vw - cardW - 20);
      const y   = safeTop + Math.random() * safeH;
      const rot = (Math.random() - 0.5) * 8;

      // Random slow velocity in any direction
      const speed = 0.18 + Math.random() * 0.22;
      const angle = Math.random() * Math.PI * 2;
      const vx    = Math.cos(angle) * speed;
      const vy    = Math.sin(angle) * speed;
      const vrot  = (Math.random() - 0.5) * 0.008;

      const authorClass = (m.author || '').toLowerCase();
      const initials    = (m.author || '?')[0].toUpperCase();

      const bubble = document.createElement('div');
      bubble.className = `moment-bubble ${authorClass}`;
      bubble.dataset.author = authorClass;
      bubble.style.cssText = `left:0;top:0;width:${cardW}px;will-change:transform;transform:translate(${x}px,${y}px) rotate(${rot}deg);`;
      bubble.innerHTML = `
        <div class="moment-glow"></div>
        <div class="moment-author-row">
          <div class="moment-avatar">${initials}</div>
          <div class="moment-author-name">${m.author || 'Unbekannt'}</div>
        </div>
        <div class="moment-text">${escapeHtml(truncate(m.text, isMobile ? 70 : 80))}</div>
        <div class="moment-meta">📅 ${m.date || ''} · ${m.time || ''}</div>
      `;
      bubble.addEventListener('click', () => openDetail(m, bubble));
      canvas.appendChild(bubble);

      floatingCards.push({ el: bubble, x, y, vx, vy, rot, vrot, w: cardW, h: cardH });
    });

    startDrift();
    applyFilter(activeFilter);
  }

  // ---- FILTER ----
  let activeFilter = 'all';

  function applyFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.moment-bubble').forEach(b => {
      b.classList.toggle('dimmed', filter !== 'all' && b.dataset.author !== filter);
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });
  }

  document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (btn) applyFilter(btn.dataset.filter);
  });

  // ---- HELPERS ----
  function truncate(str, n) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n) + '…' : str;
  }
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- DETAIL MODAL ----
  const detailOverlay = document.getElementById('detailOverlay');
  const detailCard    = document.getElementById('detailCard');
  let currentMoment   = null;

  function openDetail(m, bubble) {
    bubble.classList.add('popping');
    setTimeout(() => bubble.classList.remove('popping'), 400);
    currentMoment = m;
    const authorClass = (m.author || '').toLowerCase();
    detailCard.className = `detail-card ${authorClass}`;
    document.getElementById('detailAvatar').textContent  = (m.author || '?')[0].toUpperCase();
    document.getElementById('detailAuthor').textContent  = m.author || 'Unbekannt';
    document.getElementById('detailText').textContent    = m.text || '';
    document.getElementById('detailMeta').textContent    = `📅 ${m.date || ''} · ${m.time || ''}`;
    detailOverlay.classList.add('open');
  }

  document.getElementById('detailClose').addEventListener('click', () => detailOverlay.classList.remove('open'));
  detailOverlay.addEventListener('click', e => { if (e.target === detailOverlay) detailOverlay.classList.remove('open'); });

  // ---- LÖSCHEN ----
  const deleteOverlay = document.getElementById('deleteOverlay');

  document.getElementById('detailDelete').addEventListener('click', () => {
    if (!currentMoment) return;
    document.getElementById('deletePreview').textContent =
      currentMoment.text.length > 80 ? currentMoment.text.slice(0, 80) + '…' : currentMoment.text;
    detailOverlay.classList.remove('open');
    deleteOverlay.classList.add('open');
  });

  document.getElementById('deleteNo').addEventListener('click', () => deleteOverlay.classList.remove('open'));
  deleteOverlay.addEventListener('click', e => { if (e.target === deleteOverlay) deleteOverlay.classList.remove('open'); });

  document.getElementById('deleteYes').addEventListener('click', async () => {
    if (!currentMoment) return;
    const btn = document.getElementById('deleteYes');
    btn.textContent = '…';
    btn.disabled = true;
    try {
      await remove(ref(db, `saved_moments/${currentMoment.timestamp}`));
      deleteOverlay.classList.remove('open');
      currentMoment = null;
    } catch {
      btn.textContent = 'Fehler – nochmal';
    } finally {
      btn.textContent = 'Ja, löschen';
      btn.disabled = false;
    }
  });

  // ---- RESIZE ----
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      onValue(ref(db, 'saved_moments'), snap => renderMoments(snap.val()), { onlyOnce: true });
    }, 350);
  });
</script>
</body>
</html>
